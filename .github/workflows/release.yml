name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create plugin zip
        run: |
          mkdir -p build
          rsync -av --exclude='build' --exclude='.git' --exclude='.github' --exclude='data' --exclude='config.php' --exclude='import-person.php' --exclude='*.json' --include='composer.json' . build/personal-crm/
          cd build && zip -r personal-crm.zip personal-crm

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/personal-crm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
